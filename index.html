<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio dos Reflexos: Arena Justa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0c1b;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hud span {
            color: #00fff0;
            font-weight: bold;
        }

        /* Arena de Jogo Protegida e Proporcional */
        #game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Proporção de tela de cinema/monitores */
            background: #151324;
            border: 3px solid #00fff0;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 240, 0.2);
        }

        #target-number {
            position: absolute;
            font-size: 4rem;
            font-weight: bold;
            background: #e94560;
            color: white;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
            transition: transform 0.05s ease;
            display: none; /* Escondido até começar */
            z-index: 5;
        }

        #target-number:active {
            transform: scale(0.9);
        }

        /* Telas de Menu (Início / Game Over) */
        .menu-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1c1a30;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            z-index: 20;
            max-width: 450px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { margin-bottom: 15px; color: #00fff0; font-size: 2rem; }
        p { margin-bottom: 25px; color: #a2a1b2; line-height: 1.5; }

        button {
            background: #251f47;
            color: white;
            border: 2px solid #00fff0;
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background: #00fff0;
            color: #0f0c1b;
            box-shadow: 0 0 20px #00fff0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div>NÍVEL: <span id="level-display">1</span></div>
            <div>TEMPO LIMITE: <span id="speed-display">2000</span>ms</div>
        </div>

        <div id="game-area">
            <div id="target-number">1</div>

            <div id="menu" class="menu-screen">
                <h1 id="menu-title">Reflexo 1-2-3</h1>
                <p id="menu-text">Clique nos números na ordem (1 -> 2 -> 3). A cada ciclo, a velocidade aumenta. Encolher a tela não vai te ajudar aqui!</p>
                <button id="start-btn" onclick="startGame()">Iniciar Desafio</button>
            </div>
        </div>
    </div>

    <script>
        const target = document.getElementById('target-number');
        const gameArea = document.getElementById('game-area');
        const menu = document.getElementById('menu');
        const menuTitle = document.getElementById('menu-title');
        const menuText = document.getElementById('menu-text');
        const startBtn = document.getElementById('start-btn');
        
        const levelDisplay = document.getElementById('level-display');
        const speedDisplay = document.getElementById('speed-display');

        let currentExpected = 1;
        let level = 1;
        let baseSpeed = 2000; 
        let currentSpeed = baseSpeed;
        let gameInterval = null;
        let hasClickedCurrent = false;

        // Movimentação restrita estritamente aos limites internos da Arena
        function moveTarget() {
            const rect = gameArea.getBoundingClientRect();
            const targetSize = 90; // Diâmetro do círculo do número
            const padding = 20;    // Margem de segurança para não colar na borda interna

            // Limites baseados no tamanho real atual da div da arena
            const maxX = rect.width - targetSize - (padding * 2);
            const maxY = rect.height - targetSize - (padding * 2);
            
            // Cálculo baseado na proporção interna, independente do zoom ou janela externa
            const randomX = Math.random() * maxX + padding;
            const randomY = Math.random() * maxY + padding;

            target.style.left = `${randomX}px`;
            target.style.top = `${randomY}px`;
        }

        function spawnNumber() {
            if (!hasClickedCurrent && gameInterval !== null) {
                gameOver("Tempo esgotado!");
                return;
            }

            hasClickedCurrent = false;
            target.textContent = currentExpected;
            moveTarget();
            target.style.display = 'flex';

            clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                gameOver("Muito lento!");
            }, currentSpeed);
        }

        target.addEventListener('mousedown', (e) => {
            // Evita comportamentos estranhos de duplo clique em telas touch
            e.preventDefault(); 
            
            hasClickedCurrent = true;
            clearInterval(gameInterval);

            if (currentExpected === 3) {
                currentExpected = 1;
                level++;
                // Dificuldade progressiva: reduz o tempo em 12% por nível
                currentSpeed = Math.max(200, Math.floor(currentSpeed * 0.88)); 
                
                levelDisplay.textContent = level;
                speedDisplay.textContent = currentSpeed;
            } else {
                currentExpected++;
            }

            spawnNumber();
        });

        function startGame() {
            level = 1;
            currentExpected = 1;
            currentSpeed = baseSpeed;
            hasClickedCurrent = true;
            
            levelDisplay.textContent = level;
            speedDisplay.textContent = currentSpeed;
            
            menu.style.display = 'none';
            spawnNumber();
        }

        function gameOver(reason) {
            clearInterval(gameInterval);
            gameInterval = null;
            target.style.display = 'none';
            
            menuTitle.textContent = "Fim de Jogo!";
            menuText.innerHTML = `${reason}<br><br>Você alcançou o <strong>Nível ${level}</strong><br>Velocidade de resposta: <strong>${currentSpeed}ms</strong>`;
            startBtn.textContent = "Jogar Novamente";
            menu.style.display = 'block';
        }
    </script>
</body>
</html>
